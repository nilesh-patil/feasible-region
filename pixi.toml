[workspace]
name = "feasible-region"
description = "A visual field guide to linear programming: one simplex core in Rust, bound to Python, animated in the browser"
authors = ["Nilesh Patil <4813079+nilesh-patil@users.noreply.github.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = "3.11.*"
rust = ">=1.67"
maturin = ">=0.14"
pytest = ">=7.2"
numpy = ">=1.24"
scipy = ">=1.10"
wasm-pack = ">=0.10"
rust-std-wasm32-unknown-unknown = "*"

[tasks]
# -- develop --
test-py = { cmd = "pytest tests/ -v", description = "Python reference implementation tests" }
test-rs = { cmd = "cargo test --workspace --exclude feasible-wasm", description = "Rust workspace tests (feasible-core suite + feasible-py compile-check). feasible-wasm is excluded: it targets wasm32 and is built and checked through wasm-pack instead (pixi run build-wasm-check / msrv)." }
test = { depends-on = ["test-py", "test-rs"], description = "Full test suite" }

# -- site --
build-wasm = { cmd = "rustup run 1.67.1 wasm-pack build crates/feasible-wasm --release --target web --out-dir ../../docs/wasm --out-name feasible_core -- --locked", depends-on = ["setup-msrv"], description = "Build the solver to WASM into docs/wasm/ on the pinned Rust 1.67.1 toolchain. Release only. `-- --locked` keeps the build on the committed Cargo.lock. After building, delete the wasm-pack-generated docs/wasm/.gitignore (its `*` would hide the artifacts from Pages) and commit only feasible_core.js + feasible_core_bg.wasm." }
traces = { cmd = "python -m feasible_region.traces --out traces/ --central-path", env = { PYTHONPATH = "python" }, description = "Regenerate precomputed pivot traces (site fallback + test fixtures)" }
traces-check = { cmd = "python -m feasible_region.traces --check --out traces/", env = { PYTHONPATH = "python" }, description = "Fail if committed traces drift from the current solver" }
serve = { cmd = "python -m http.server 8137 -d docs", description = "Serve the site locally at http://localhost:8137" }
sync-site-data = { cmd = "mkdir -p docs/traces && cp traces/*.json docs/traces/", description = "Copy golden traces into docs/ (GitHub Pages serves docs/ only)" }

# -- bench --
bench-core = { cmd = "cargo build --release --example bench -p feasible-core", description = "Build the in-process core bench example (workspace release profile — the shipped opt-level=z build, deliberately not a speed-tuned one)." }
bench = { cmd = "python -m feasible_region.bench --out bench/results.json --rust-bin target/release/examples/bench", env = { PYTHONPATH = "python" }, depends-on = ["build-py", "bench-core"], description = "Record bench/results.json: the reference, native and in-process-Rust engines over the seeded sweep plus every named fixture, parity-gated. Machine-dependent by design; commit a run only when the recorded machine block should change." }

# -- native / packaging --
# The wasm build always runs on the pinned toolchain: wasm-bindgen 0.2.84 is
# matched to Rust 1.67.1 (the declared MSRV), and the committed Cargo.lock
# holds the proc-macro tree (proc-macro2 1.0.51, quote 1.0.23, syn 1.0.109)
# so the build stays reproducible whatever toolchain is installed locally.
build-py = { cmd = "maturin develop --release", description = "Build the native extension (release, abi3) into python/feasible_region/_core and install it into the pixi env. Local builds only, never published. Enables backend=native for the equivalence tests." }
test-native = { cmd = "pytest tests/ -v", env = { PYTHONPATH = "python" }, depends-on = ["build-py"], description = "Build the native extension, then run the suite with backend=native available so the native equivalence tests execute (they skip when the extension is absent)." }
build-wheel = { cmd = "maturin build --release --out dist", description = "Build a release wheel into dist/ with maturin. Local artifact only, not published." }
setup-msrv = { cmd = "rustup toolchain install 1.67.1 --profile minimal --target wasm32-unknown-unknown", description = "Install the pinned Rust 1.67.1 toolchain (+ wasm32 target) used for the wasm build and the MSRV gate." }
build-wasm-check = { cmd = "rustup run 1.67.1 wasm-pack build crates/feasible-wasm --release --target web --out-dir ../../target/wasm-stub-check --out-name feasible_core -- --locked", depends-on = ["setup-msrv"], description = "Compile-check the WASM crate with Rust 1.67.1 to a scratch dir (NOT docs/, which the live site owns) — proves the wasm pipeline builds without touching the site. `-- --locked` matches build-wasm: the committed lock keeps proc-macro2 on the 1.67.1-compatible 1.0.51." }
msrv = { cmd = "rustup run 1.67.1 cargo test -p feasible-core --locked && rustup run 1.67.1 cargo build -p feasible-wasm --target wasm32-unknown-unknown --locked", depends-on = ["setup-msrv"], description = "Compiler-verified MSRV gate: feasible-core tests + feasible-wasm build on real Rust 1.67.1 against the committed lock." }
